services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: onsheet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: onsheet
      POSTGRES_PASSWORD: onsheet_pass
      POSTGRES_DB: onsheet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onsheet -d onsheet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: onsheet_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: onsheet_api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://onsheet:onsheet_pass@postgres:5432/onsheet_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations then start the server
    command: sh -c "./node_modules/.bin/prisma migrate deploy && node dist/main"

volumes:
  postgres_data:
  redis_data:
