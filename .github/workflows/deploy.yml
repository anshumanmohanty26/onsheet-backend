name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ubuntu
      APP_DIR: /home/ubuntu/onsheet-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/watchrudra.pem
          chmod 600 ~/.ssh/watchrudra.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy project files to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'dist' \
            -e "ssh -i ~/.ssh/watchrudra.pem -o StrictHostKeyChecking=no" \
            ./ ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.APP_DIR }}

      - name: Create .env file on EC2
        run: |
          ssh -i ~/.ssh/watchrudra.pem -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
          cat > ${{ env.APP_DIR }}/.env << ENVFILE
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_ACCESS_EXPIRES_IN=${{ secrets.JWT_ACCESS_EXPIRES_IN }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          GOOGLE_VERTEX_AI_API_KEY=${{ secrets.GOOGLE_VERTEX_AI_API_KEY }}
          GOOGLE_CLOUD_PROJECT=${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_VERTEX_AI_LOCATION=${{ secrets.GOOGLE_VERTEX_AI_LOCATION }}
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          ENVFILE
          EOF

      - name: Build and deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/watchrudra.pem -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
          cd ${{ env.APP_DIR }}

          # Build and restart containers using the production Dockerfile
          docker compose -f docker/docker-compose.yml build --no-cache
          docker compose -f docker/docker-compose.yml up -d

          # Prune old images to save disk space
          docker image prune -f

          echo "✅ Deployment complete!"
          EOF

      - name: Verify deployment
        run: |
          echo "Waiting for the app to start..."
          sleep 15
          ssh -i ~/.ssh/watchrudra.pem -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
            "docker ps --filter name=onsheet"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/watchrudra.pem
